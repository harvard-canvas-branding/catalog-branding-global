name: Minify and Upload Assets
on:
  release:
    types: [published]

  workflow_dispatch:

# Needed so the workflow can attach files to the release that triggered it.
permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install minifiers
        run: npm install --no-save --no-audit --no-fund terser@^5.36.0 lightningcss-cli@^1.30.1

      # Resolve a version string. On a release, use the tag; otherwise (workflow_dispatch)
      # fall back to the short commit SHA. The untrusted tag is read from an env var
      # (never interpolated into the script) and sanitized to safe filename characters.
      - name: Resolve version
        id: version
        env:
          RAW_VERSION: ${{ github.event.release.tag_name || github.sha }}
        run: |
          version="$(printf '%s' "$RAW_VERSION" | tr -c 'A-Za-z0-9._-' '-')"
          version="${version#v}"
          if [ "${{ github.event_name }}" != "release" ]; then
            version="${version:0:7}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Minify JS and CSS
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p assets
          npx --no-install terser js/global.js --compress --mangle --output "assets/exed-global-$VERSION.min.js"
          npx --no-install lightningcss --minify css/global.css -o "assets/exed-global-$VERSION.min.css"

      # Always available (useful for workflow_dispatch runs, which have no release).
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: minified-assets
          path: assets/

      # On a published release, attach the minified files as release assets.
      - name: Attach assets to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            assets/exed-global-*.min.js \
            assets/exed-global-*.min.css \
            --clobber
