name: Minify and Upload Assets
on:
  release:
    types: [published]

  workflow_dispatch:

# Needed so the workflow can attach files to the release that triggered it.
permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install minifiers
        run: npm install --no-save --no-audit --no-fund babel-minify@^0.5.2 lightningcss-cli@^1.30.1

      - name: Minify JS and CSS
        run: |
          mkdir -p assets
          npx --no-install -p babel-minify minify js/global.js > assets/global.min.js
          npx --no-install lightningcss --minify css/global.css -o assets/global.min.css

      # Always available (useful for workflow_dispatch runs, which have no release).
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: minified-assets
          path: assets/

      # On a published release, attach the minified files as release assets.
      - name: Attach assets to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            assets/global.min.js \
            assets/global.min.css \
            --clobber
